# Application-only compose: vLLM + model-service.
# TEE infrastructure (nginx, attestation) comes from Shade.
#
# Flow:
#   1. Both containers start together.
#   2. vLLM polls model-service /ready until model is pushed.
#   3. Model owner pushes weights via POST /push-model.
#   4. model-service /ready returns 200 → vLLM starts serving.
services:
  vllm:
    container_name: vllm
    image: ghcr.io/concrete-security/vllm-openai@sha256:d6ee07e203f0e43dc6b80b600b972fe1dfc9e0eed7810343a4a1beb7727d5062
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - model-store:/models
      - huggingface-cache:/root/.cache/huggingface
    runtime: nvidia
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for model push..."
        while ! curl -sf http://model-service:8001/ready; do sleep 5; done
        echo "Model ready, starting vLLM"
        exec python3 -m vllm.entrypoints.openai.api_server \
          --model /models/current \
          --tensor-parallel-size 1 \
          --gpu-memory-utilization 0.85 \
          --max-model-len 16384 \
          --max-num-seqs 8 \
          --reasoning-parser openai_gptoss \
          --enable-auto-tool-choice \
          --tool-call-parser openai \
          --async-scheduling \
          --enforce-eager \
          --served-model-name openai/gpt-oss-120b
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      start_period: 10m
      start_interval: 30s
      interval: 30s
      timeout: 10s
      retries: 3

  model-service:
    container_name: model-service
    build:
      context: ./model-service
      dockerfile: Dockerfile
    volumes:
      - model-store:/models
    environment:
      MODEL_DIR: /models/current
      PUSH_TOKEN: ${PUSH_TOKEN:-}
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  model-store:
  huggingface-cache:

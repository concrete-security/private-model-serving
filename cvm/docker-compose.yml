services:
  vllm:
    image: ghcr.io/concrete-security/vllm-openai@sha256:d6ee07e203f0e43dc6b80b600b972fe1dfc9e0eed7810343a4a1beb7727d5062
    container_name: vllm
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - model-store:/models
    runtime: nvidia
    expose:
      - "8000"
    networks:
      - proxy
    command: >
      --model /models/current
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.95
      --max-model-len 131072
      --max-num-seqs 8
      --reasoning-parser openai_gptoss
      --enable-auto-tool-choice
      --tool-call-parser openai
      --async-scheduling
      --allowed-origins []
    restart: unless-stopped
    depends_on:
      model-service:
        condition: service_started
    healthcheck:
      start_interval: 1h30m
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  model-service:
    image: ghcr.io/concrete-security/model-service:latest
    container_name: model-service
    volumes:
      - model-store:/models
    environment:
      MODEL_DIR: /models/current
    expose:
      - "8001"
    networks:
      - proxy
    restart: unless-stopped
    healthcheck:
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]

  nginx-cert-manager:
    image: ghcr.io/concrete-security/cert-manager@sha256:1af9c4381774484be345eb6bbc6216c8020367e78b06b15c875a7fe5eb63a872
    container_name: nginx-cert-manager
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: vllm.concrete-security.com
      DEV_MODE: "false"
      LETSENCRYPT_STAGING: "false"
      LETSENCRYPT_ACCOUNT_VERSION: v1
      FORCE_RM_CERT_FILES: "false"
      AUTH_ENABLED: "false"
      EKM_SHARED_SECRET: ${EKM_SHARED_SECRET}
      EXTRA_LOCATIONS: |
        location = /push-model {
            client_max_body_size 0;
            proxy_pass http://model-service:8001;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
        }

        location = /model-hash {
            proxy_pass http://model-service:8001;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
        }

        location /v1/ {
            proxy_pass http://vllm:8000;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    volumes:
      - tls-certs-keys:/etc/nginx/ssl/
      - /var/run/dstack.sock:/var/run/dstack.sock
    networks:
      - proxy
      - attestation
    restart: unless-stopped

  attestation-service:
    image: ghcr.io/concrete-security/attestation-service@sha256:51e52f431cbae53a50b258733283199fcde983a53531f65067da8ac07b5fb7ad
    container_name: attestation-service
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      WORKERS: "8"
      EKM_SHARED_SECRET: ${EKM_SHARED_SECRET}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    expose:
      - "8080"
    networks:
      - attestation
    restart: unless-stopped

networks:
  proxy:
    driver: bridge
  attestation:
    driver: bridge

volumes:
  model-store:
  tls-certs-keys:

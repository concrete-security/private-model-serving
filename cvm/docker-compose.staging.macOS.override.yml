# Staging macOS override: official vLLM image (arm64, no GPU), self-signed cert,
# localhost domain, no dstack socket, build all services locally.
services:
  vllm:
    image: vllm/vllm-openai:latest
    runtime: runc

  model-service:
    build:
      context: ./model-service
      dockerfile: Dockerfile

  nginx-cert-manager:
    build:
      context: ./cert-manager
      dockerfile: Dockerfile
    environment:
      DOMAIN: localhost
      DEV_MODE: "true"
      EKM_SHARED_SECRET: dev-ekm-secret-change-in-production-min-32-chars
    volumes:
      - /dev/null:/var/run/dstack.sock:ro

  attestation-service:
    build:
      context: ./attestation-service
      dockerfile: Dockerfile
    environment:
      WORKERS: "1"
      EKM_SHARED_SECRET: dev-ekm-secret-change-in-production-min-32-chars
    volumes:
      - /dev/null:/var/run/dstack.sock:ro

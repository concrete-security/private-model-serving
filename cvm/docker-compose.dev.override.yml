# Dev override: mock vLLM, self-signed cert (no Let's Encrypt),
# localhost domain, no dstack socket, build model-service locally.
services:
  vllm:
    image: python:3.11-slim
    container_name: vllm-mock
    runtime: runc
    configs:
      - source: mock_server
        target: /app/mock_server.py
        mode: 0444
      - source: mock_entrypoint
        target: /app/entrypoint.sh
        mode: 0744
    command:
    entrypoint: /app/entrypoint.sh
    healthcheck:
      start_period: 10s
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  model-service:
    build:
      context: ./model-service
      dockerfile: Dockerfile

  nginx-cert-manager:
    build:
      context: ./cert-manager
      dockerfile: Dockerfile
    environment:
      DOMAIN: localhost
      DEV_MODE: "true"
      EKM_SHARED_SECRET: dev-ekm-secret-change-in-production-min-32-chars
    volumes:
      - /dev/null:/var/run/dstack.sock:ro

  attestation-service:
    build:
      context: ./attestation-service
      dockerfile: Dockerfile
    environment:
      WORKERS: "1"
      EKM_SHARED_SECRET: dev-ekm-secret-change-in-production-min-32-chars
    volumes:
      - /dev/null:/var/run/dstack.sock:ro

configs:
  mock_entrypoint:
    content: |
      #!/bin/sh
      pip install fastapi[standard] uvicorn pydantic
      fastapi run --host 0.0.0.0 --port 8000 /app/mock_server.py
  mock_server:
    content: |
      from fastapi import FastAPI
      from pydantic import BaseModel
      from typing import List, Optional
      import time

      app = FastAPI()

      class ChatMessage(BaseModel):
          role: str
          content: str

      class ChatCompletionRequest(BaseModel):
          model: str
          messages: List[ChatMessage]
          temperature: Optional[float] = 0.7
          max_tokens: Optional[int] = None
          stream: Optional[bool] = False

      @app.get('/health')
      async def health():
          return {'status': 'ok'}

      @app.get('/v1/models')
      async def list_models():
          return {
              'object': 'list',
              'data': [{
                  'id': 'openai/gpt-oss-120b',
                  'object': 'model',
                  'created': int(time.time()),
                  'owned_by': 'mock',
              }],
          }

      @app.post('/v1/chat/completions')
      async def chat_completions(request: ChatCompletionRequest):
          return {
              'id': f'chatcmpl-mock-{int(time.time())}',
              'object': 'chat.completion',
              'created': int(time.time()),
              'model': request.model,
              'choices': [{
                  'index': 0,
                  'message': {
                      'role': 'assistant',
                      'content': f'Mock response to: {request.messages[-1].content}',
                  },
                  'finish_reason': 'stop',
              }],
              'usage': {'prompt_tokens': 50, 'completion_tokens': 20, 'total_tokens': 70},
          }

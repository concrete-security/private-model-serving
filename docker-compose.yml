# Application-only compose: vLLM + model-service.
# TEE infrastructure (nginx, attestation) comes from Shade.
#
# Flow:
#   1. Both containers start together.
#   2. vLLM polls model-service /ready until model is pushed.
#   3. Model owner pushes weights via POST /push-model.
#   4. model-service /ready returns 200 → vLLM starts serving.
services:
  vllm:
    container_name: vllm
    image: vllm/vllm-openai-cpu:v0.17.1
    volumes:
      - model-store:/models
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for model push..."
        while ! curl -sf http://model-service:8001/ready; do sleep 5; done
        echo "Model ready, starting vLLM"
        exec python3 -m vllm.entrypoints.openai.api_server \
          --model /models/current \
          --host 0.0.0.0 \
          --max-model-len 512 \
          --max-num-seqs 1 \
          --swap-space 0 \
          --enforce-eager \
          --disable-frontend-multiprocessing \
          --enable-log-requests \
          --served-model-name Qwen/Qwen2.5-0.5B-Instruct
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      start_period: 10m
      start_interval: 30s
      interval: 30s
      timeout: 10s
      retries: 3

  model-service:
    container_name: model-service
    image: ghcr.io/concrete-security/private-model-serving-model-service@sha256:4ed581c089bb5af4862e73f4e72ed71a110d07fe3817af3f8da6d68a8cf67068
    volumes:
      - model-store:/models
    environment:
      MODEL_DIR: /models/current
      PUSH_TOKEN: ${PUSH_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  model-store:

# Dev override: adds nginx + attestation in dev mode for full-stack testing
# without a real TEE. Use with: docker compose -f docker-compose.yml -f docker-compose.dev.override.yml up
services:
  vllm:
    networks:
      - proxy

  model-service:
    networks:
      - proxy

  nginx-cert-manager:
    image: cert-manager-dev
    container_name: nginx-cert-manager
    build:
      context: ./services/cert-manager
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=localhost
      - CORS_ORIGINS=["^https?://.*$$"]
      - AUTH_ENABLED=false
      - DEV_MODE=true
      - LETSENCRYPT_STAGING=false
      - LETSENCRYPT_ACCOUNT_VERSION=v1
      - FORCE_RM_CERT_FILES=false
      - LOG_LEVEL=INFO
      - EKM_SHARED_SECRET=dev-mode-ekm-placeholder-not-for-production
      - "EXTRA_UPSTREAMS=upstream model_service_8001 {\n    server model-service:8001;\n}\n\nupstream vllm_8000 {\n    server vllm:8000;\n}"
      - "EXTRA_LOCATIONS=    location /push-model {\n$${CORS_HEADERS}\n        proxy_pass http://model_service_8001;\n        proxy_set_header Host $$host;\n        proxy_set_header X-Real-IP $$remote_addr;\n        proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $$scheme;\n        proxy_read_timeout 900;\n    }\n\n    location /model-hash {\n$${CORS_HEADERS}\n        proxy_pass http://model_service_8001;\n        proxy_set_header Host $$host;\n        proxy_set_header X-Real-IP $$remote_addr;\n        proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $$scheme;\n    }\n\n    location /v1/ {\n$${CORS_HEADERS}\n        proxy_pass http://vllm_8000;\n        proxy_set_header Host $$host;\n        proxy_set_header X-Real-IP $$remote_addr;\n        proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $$scheme;\n    }"
    volumes:
      - tls-certs-keys:/etc/nginx/ssl/
      - ./services/cert-manager/nginx_conf/https-dev.conf.tmpl:/app/nginx_conf/https-dev.conf.tmpl:ro
    networks:
      - proxy
      - attestation
    restart: unless-stopped

  attestation-service:
    image: attestation-service-dev
    container_name: attestation-service
    build:
      context: ./services/attestation-service
      dockerfile: Dockerfile
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - WORKERS=1
      - SERVICE_SCRIPT=attestation_service_with_debug.py
      - EKM_SHARED_SECRET=dev-mode-ekm-placeholder-not-for-production
    volumes:
      - ./services/attestation-service/attestation_service_with_debug.py:/app/attestation_service_with_debug.py:ro
    expose:
      - "8080"
    networks:
      - attestation
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1

networks:
  proxy:
    driver: bridge
  attestation:
    driver: bridge

volumes:
  tls-certs-keys:
